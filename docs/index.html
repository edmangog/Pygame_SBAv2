<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game V2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }
        #pygame_canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="pygame_canvas" width="720" height="480"></canvas>
    <script src="https://cdn.jsdelivr.net/gh/pygame-web/pygbag@0.8.7/static/pythons.js" type="module"></script>
    <script type="module">
        import { loadPygbag } from 'https://cdn.jsdelivr.net/gh/pygame-web/pygbag@0.8.7/static/pythons.js';
        
        loadPygbag({
            canvas: document.getElementById('pygame_canvas'),
            width: 720,
            height: 480
        });
    </script>
</body>
</html>
